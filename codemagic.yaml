# Codemagic cloud-Mac build for BarterThat iOS (Capacitor).
# Setup steps are in the chat — you connect this repo in codemagic.io,
# add your App Store Connect API key (name it exactly "BarterThat ASC Key"),
# then run the "ios-release" workflow.
workflows:
  ios-release:
    name: BarterThat iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BarterThat ASC Key
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.barterthat.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --no-audit --no-fund
      - name: Build web app
        script: CI=false npm run build
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing (creates cert + App Store profile if missing)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) % 100000)) || true
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
