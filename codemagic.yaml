# Codemagic cloud-Mac build for BarterThat iOS (Capacitor).
# Setup steps are in the chat — you connect this repo in codemagic.io,
# add your App Store Connect API key (name it exactly "BarterThat ASC Key"),
# then run the "ios-release" workflow.
workflows:
  ios-release:
    name: BarterThat iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BarterThat ASC Key
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.barterthat.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --no-audit --no-fund
      - name: Build web app
        script: CI=false npm run build
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Inject Info.plist keys (permissions + export compliance)
        script: |
          PLIST=ios/App/App/Info.plist
          set_str(){ plutil -replace "$1" -string "$2" "$PLIST" 2>/dev/null || plutil -insert "$1" -string "$2" "$PLIST"; }
          set_str NSCameraUsageDescription "BarterThat uses your camera to add photos or video to a listing and to capture before/after proof for a Safe Swap."
          set_str NSPhotoLibraryUsageDescription "BarterThat lets you attach photos from your library to a listing or a trade."
          set_str NSMicrophoneUsageDescription "BarterThat uses your microphone to record optional voice notes and the audio for video proof in a trade."
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST" 2>/dev/null || plutil -insert ITSAppUsesNonExemptEncryption -bool false "$PLIST"
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
      - name: Set up code signing (revoke stale certs, then one clean cert + profile)
        script: |
          keychain initialize
          # Apple caps you at ~2 Distribution certificates per team. Minting a new one
          # every build hits that cap, after which no usable cert/profile is produced
          # and the archive fails with "requires a provisioning profile" (exit 65).
          # Fix: revoke existing Distribution certs first, then create exactly ONE fresh
          # cert + profile. Revoking is safe for App Store builds — Apple re-signs
          # accepted uploads, so already-shipped/processed builds are unaffected.
          for CID in $(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); items=d if isinstance(d,list) else d.get('data',[]); print('\n'.join(str(c.get('id','')) for c in items))" 2>/dev/null); do
            [ -n "$CID" ] && app-store-connect certificates delete "$CID" --ignore-not-found || true
          done
          # Fresh private key + one new distribution certificate we hold the key for.
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_key.pem \
            --save
          # Create/fetch the App Store provisioning profile against that cert.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) % 100000)) || true
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect for App Review, but DON'T auto-submit to
        # TestFlight external beta (that needs a one-time Beta test-info form and
        # was showing "post-processing failed" on every otherwise-successful build).
        submit_to_testflight: false

  # ── GOOGLE PLAY (Android) ─────────────────────────────────────────────────────
  # SETUP (one time) — full steps in the chat:
  #   1. Google Play Developer account; create the app (com.barterthat.app).
  #   2. Generate an upload keystore; add these to a Codemagic env group named
  #      "google_play" (mark all Secure):
  #        CM_KEYSTORE  (base64 of the .jks),  CM_KEYSTORE_PASSWORD,
  #        CM_KEY_ALIAS,  CM_KEY_PASSWORD,
  #        GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (the Play service-account JSON).
  #   3. Run "android-release" -> builds a signed .aab and uploads to the internal track.
  android-release:
    name: BarterThat Android Release
    # Build Android on the Mac instance too — the free plan only includes mac_mini_m2
    # (linux_x2 requires a paid plan). macOS machines have the Android SDK + JDK.
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.barterthat.app"
      node: 22
    scripts:
      - name: Install npm dependencies
        script: npm install --no-audit --no-fund
      - name: Build web app
        script: CI=false npm run build
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Set up Android signing (from Codemagic secrets)
        script: |
          echo "$CM_KEYSTORE" | openssl base64 -d -A > "$CM_BUILD_DIR/upload-keystore.jks"
          cat > android/keystore.properties <<EOF
          storeFile=$CM_BUILD_DIR/upload-keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Bump versionCode (monotonic)
        script: |
          cd android
          sed -i.bak "s/versionCode .*/versionCode $(date +%s)/" app/build.gradle && rm -f app/build.gradle.bak
      - name: Build signed AAB
        script: |
          cd android
          chmod +x gradlew
          # Capacitor 8 Android compiles source release 21, but the Mac image defaults
          # to Java 17 ("invalid source release: 21"). Resolve JDK 21 robustly (M2/arm64)
          # and force Gradle to use it.
          echo "=== JDKs available ==="; /usr/libexec/java_home -V 2>&1 || true
          JH="$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 21 --arch arm64 2>/dev/null)"
          [ -z "$JH" ] && JH="$(ls -d /Library/Java/JavaVirtualMachines/*21*/Contents/Home 2>/dev/null | head -1)"
          if [ -z "$JH" ]; then echo "ERROR: no JDK 21 found on this machine"; exit 1; fi
          export JAVA_HOME="$JH"
          echo "Using JAVA_HOME=$JAVA_HOME"; "$JAVA_HOME/bin/java" -version
          ./gradlew bundleRelease -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    # No auto-publish to Google Play: Codemagic builds the signed .aab and exposes it
    # as the artifact above. Download it and upload it in Play Console (this fits
    # Managed Publishing, where you press Publish yourself). To auto-upload later,
    # add a valid Play service-account JSON as GCLOUD_SERVICE_ACCOUNT_CREDENTIALS and
    # restore a `publishing: google_play:` block here.
